[build]
publish = "public"
command = "hugo"

[build.environment]
HUGO_VERSION = "0.147.7"
GO_VERSION = "1.24.3"
NODE_VERSION = "22.16.0"

# Headers for better performance (optional)
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "*.css"
[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "*.js"
[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "*.json"
[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "*.glsl"
[headers.values]
Cache-Control = "no-cache"
